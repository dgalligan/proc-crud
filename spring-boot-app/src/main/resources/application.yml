# Component: backend-api
# Owner: samson-platform
# Description: Main application configuration for Oracle datasource and JPA
# Confidential - T-Mobile USA Inc. For internal use only.

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:ORCL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

server:
  port: ${SERVER_PORT:8080}

management:
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: ${OTEL_SERVICE_NAME:source}
