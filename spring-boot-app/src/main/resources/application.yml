spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:ORCL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
server:
  port: ${SERVER_PORT:8080}
